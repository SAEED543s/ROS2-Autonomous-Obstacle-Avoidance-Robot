<!DOCTYPE html>
<html>
<head>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #1a1a2e; font-family: monospace; overflow: hidden; }
canvas { display: block; }
#controls {
  position: absolute; top: 10px; right: 10px;
  display: flex; flex-direction: column; gap: 6px; z-index: 10;
}
button {
  padding: 8px 16px; border: none; border-radius: 6px;
  font-size: 13px; font-weight: bold; cursor: pointer; letter-spacing: 1px;
}
.btn-start { background: #00e676; color: #000; }
.btn-stop  { background: #ff1744; color: #fff; }
.btn-reset { background: #448aff; color: #fff; }
#status {
  position: absolute; top: 10px; left: 10px;
  background: rgba(0,0,0,0.7); color: #0f0; padding: 8px 12px;
  border-radius: 8px; font-size: 12px; line-height: 1.8; z-index: 10;
}
#log {
  position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
  background: rgba(0,0,0,0.75); color: #0f0; padding: 6px 16px;
  border-radius: 6px; font-size: 12px; z-index: 10; white-space: nowrap;
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="controls">
  <button class="btn-start" onclick="startRobot()">▶ START (S)</button>
  <button class="btn-stop"  onclick="stopRobot()">■ STOP (X)</button>
  <button class="btn-reset" onclick="resetRobot()">↺ RESET</button>
</div>
<div id="status">
  <div>📡 BT: <span id="btStatus">Waiting...</span></div>
  <div>📏 Dist: <span id="distVal">0.0</span> cm</div>
  <div>🎯 Target: 200 cm</div>
  <div>⚠️ Obstacle: <span id="obsVal">clear</span></div>
  <div>🟢 LED: <span id="ledVal">OFF</span></div>
  <div>⚙️ Encoders L:<span id="encL">0</span> R:<span id="encR">0</span></div>
</div>
<div id="log">🤖 Group 06 Robot — Send S to Start</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
canvas.width  = window.innerWidth;
canvas.height = window.innerHeight;

const CX = canvas.width  / 2;
const CY = canvas.height / 2;

let robotRunning = false;
let distance = 0;
let encoderL = 0, encoderR = 0;
let obstacleNear = false;
let wheelAngle = 0;
let turnDir = 0;
let turning = false;
let turnTimer = 0;
let ledOn = false;
let frame = 0;

const WHEEL_CIRC = 20;
const PPR = 20;
const TARGET = 200;
const OBS_DIST = 20;

function startRobot() {
  if (robotRunning) return;
  robotRunning = true;
  distance = 0; encoderL = 0; encoderR = 0;
  document.getElementById('btStatus').textContent = 'Connected ✓';
  document.getElementById('log').textContent = '🚀 Robot STARTED — Target: 200cm';
}
function stopRobot() {
  robotRunning = false; ledOn = false;
  document.getElementById('btStatus').textContent = 'Stopped';
  document.getElementById('log').textContent = '⛔ Robot STOPPED by Bluetooth';
}
function resetRobot() {
  robotRunning = false; distance = 0; encoderL = 0; encoderR = 0;
  ledOn = false; turning = false; turnTimer = 0;
  document.getElementById('btStatus').textContent = 'Waiting...';
  document.getElementById('log').textContent = '🔄 Reset — Send S to Start';
}

document.addEventListener('keydown', e => {
  if (e.key === 's' || e.key === 'S') startRobot();
  if (e.key === 'x' || e.key === 'X') stopRobot();
  if (e.key === 'r' || e.key === 'R') resetRobot();
});

function fakeObstacle() {
  return distance > 40 && distance % 80 < 20;
}

function update() {
  frame++;
  if (!robotRunning) { ledOn = false; return; }

  obstacleNear = fakeObstacle();

  if (distance >= TARGET) {
    robotRunning = false; ledOn = false;
    document.getElementById('log').textContent = '✅ 200cm reached! Mission complete!';
    return;
  }

  if (obstacleNear) {
    turning = true; turnTimer = 30; ledOn = false;
    document.getElementById('log').textContent = '⚠️ Obstacle! Turning right...';
  }

  if (turning) {
    turnTimer--;
    if (turnTimer <= 0) { turning = false; }
    return;
  }

  ledOn = true;
  const step = 0.5;
  distance += step;
  encoderL += 0.5; encoderR += 0.5;
  wheelAngle += 0.18;
  document.getElementById('log').textContent = '🟢 Moving forward... ' + distance.toFixed(1) + ' cm';
}

function drawRobot(cx, cy) {
  ctx.save();
  ctx.translate(cx, cy);

  const W = 140, H = 190;

  // chassis (transparent acrylic)
  ctx.save();
  ctx.globalAlpha = 0.55;
  ctx.fillStyle = '#b2ebf2';
  ctx.strokeStyle = '#00bcd4';
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.moveTo(-W/2+30, -H/2);
  ctx.lineTo( W/2-30, -H/2);
  ctx.quadraticCurveTo( W/2, -H/2, W/2, -H/2+30);
  ctx.lineTo( W/2,  H/2-30);
  ctx.quadraticCurveTo( W/2, H/2, W/2-30, H/2);
  ctx.lineTo(-W/2+30, H/2);
  ctx.quadraticCurveTo(-W/2, H/2, -W/2, H/2-30);
  ctx.lineTo(-W/2, -H/2+30);
  ctx.quadraticCurveTo(-W/2, -H/2, -W/2+30, -H/2);
  ctx.closePath();
  ctx.fill(); ctx.stroke();
  ctx.restore();

  // screw holes
  [[  -W/2+14, -H/2+14], [W/2-14, -H/2+14],
   [  -W/2+14,  H/2-14], [W/2-14,  H/2-14]].forEach(([x,y])=>{
    ctx.beginPath(); ctx.arc(x,y,5,0,Math.PI*2);
    ctx.fillStyle='#90caf9'; ctx.fill();
    ctx.strokeStyle='#1565c0'; ctx.lineWidth=1; ctx.stroke();
  });

  // --- LEFT MOTOR ---
  ctx.save(); ctx.translate(-W/2-8, -30);
  ctx.fillStyle='#424242'; ctx.strokeStyle='#9e9e9e'; ctx.lineWidth=1.5;
  ctx.fillRect(-22,-18,44,36); ctx.strokeRect(-22,-18,44,36);
  ctx.fillStyle='#d32f2f'; ctx.fillRect(-12,-10,24,20);
  ctx.restore();

  // --- RIGHT MOTOR ---
  ctx.save(); ctx.translate(W/2+8, -30);
  ctx.fillStyle='#424242'; ctx.strokeStyle='#9e9e9e'; ctx.lineWidth=1.5;
  ctx.fillRect(-22,-18,44,36); ctx.strokeRect(-22,-18,44,36);
  ctx.fillStyle='#d32f2f'; ctx.fillRect(-12,-10,24,20);
  ctx.restore();

  // WHEEL function
  function drawWheel(wx, wy, angle) {
    ctx.save(); ctx.translate(wx, wy); ctx.rotate(angle);
    // tire
    ctx.beginPath(); ctx.ellipse(0,0,22,38,0,0,Math.PI*2);
    ctx.fillStyle='#212121'; ctx.fill();
    ctx.strokeStyle='#616161'; ctx.lineWidth=1.5; ctx.stroke();
    // treads
    for (let i=0; i<10; i++) {
      const a = (i/10)*Math.PI*2;
      ctx.save(); ctx.rotate(a);
      ctx.fillStyle='#424242';
      ctx.fillRect(-3, 20, 6, 8);
      ctx.restore();
    }
    // rim
    ctx.beginPath(); ctx.ellipse(0,0,12,20,0,0,Math.PI*2);
    ctx.fillStyle='#fdd835'; ctx.fill();
    ctx.strokeStyle='#f9a825'; ctx.lineWidth=1.5; ctx.stroke();
    // hub
    ctx.beginPath(); ctx.arc(0,0,5,0,Math.PI*2);
    ctx.fillStyle='#1a1a1a'; ctx.fill();
    // spokes
    for (let i=0;i<4;i++){
      const a=(i/4)*Math.PI*2;
      ctx.beginPath();
      ctx.moveTo(Math.cos(a)*5, Math.sin(a)*5);
      ctx.lineTo(Math.cos(a)*11, Math.sin(a)*19);
      ctx.strokeStyle='#f9a825'; ctx.lineWidth=2; ctx.stroke();
    }
    ctx.restore();
  }

  const wa = robotRunning && !turning ? wheelAngle : 0;
  drawWheel(-W/2-22, -55, wa);
  drawWheel( W/2+22, -55, wa);

  // encoder discs on motors (small rotating disc)
  function drawEncoder(ex, ey) {
    ctx.save(); ctx.translate(ex, ey); ctx.rotate(wa*3);
    ctx.beginPath(); ctx.arc(0,0,9,0,Math.PI*2);
    ctx.fillStyle='#78909c'; ctx.fill();
    for(let i=0;i<8;i++){
      const a=(i/8)*Math.PI*2;
      ctx.beginPath();
      ctx.moveTo(0,0); ctx.lineTo(Math.cos(a)*9,Math.sin(a)*9);
      ctx.strokeStyle= i%2===0?'#000':'#fff'; ctx.lineWidth=1.5; ctx.stroke();
    }
    // IR LED pair (blue dots)
    ctx.beginPath(); ctx.arc(-12,0,3,0,Math.PI*2);
    ctx.fillStyle='#29b6f6'; ctx.fill();
    ctx.beginPath(); ctx.arc(12,0,3,0,Math.PI*2);
    ctx.fillStyle='#ef5350'; ctx.fill();
    ctx.restore();
  }
  drawEncoder(-W/2+2, -30);
  drawEncoder( W/2-2, -30);

  // ---- L298N MOTOR DRIVER ----
  ctx.save(); ctx.translate(0, -20);
  ctx.fillStyle='#1b5e20'; ctx.fillRect(-32,-22,64,44);
  ctx.strokeStyle='#4caf50'; ctx.lineWidth=1.2; ctx.strokeRect(-32,-22,64,44);
  ctx.fillStyle='#2e7d32'; ctx.fillRect(-20,-14,40,28);
  // L298N chip
  ctx.fillStyle='#212121'; ctx.fillRect(-10,-8,20,16);
  ctx.fillStyle='#fff'; ctx.font='6px monospace'; ctx.textAlign='center';
  ctx.fillText('L298N',0,3);
  // heat sink fins
  for(let i=-3;i<=3;i++){
    ctx.fillStyle='#9e9e9e';
    ctx.fillRect(i*5-1,-22,2,6);
  }
  ctx.restore();

  // ---- ARDUINO MEGA ----
  ctx.save(); ctx.translate(0, 30);
  ctx.fillStyle='#006064'; ctx.fillRect(-48,-28,96,56);
  ctx.strokeStyle='#00bcd4'; ctx.lineWidth=1.5; ctx.strokeRect(-48,-28,96,56);
  // USB port
  ctx.fillStyle='#78909c'; ctx.fillRect(-48,-10,8,20);
  // reset button
  ctx.fillStyle='#ef5350'; ctx.beginPath(); ctx.arc(30,-18,5,0,Math.PI*2); ctx.fill();
  // pin rows top
  for(let i=0;i<14;i++){
    ctx.fillStyle='#fdd835';
    ctx.fillRect(-46+i*6.5,-28,4,8);
  }
  // pin rows bottom  
  for(let i=0;i<8;i++){
    ctx.fillStyle='#fdd835';
    ctx.fillRect(-20+i*6.5,20,4,8);
  }
  ctx.fillStyle='#fff'; ctx.font='7px monospace'; ctx.textAlign='center';
  ctx.fillText('ARDUINO MEGA',0,6);
  ctx.fillStyle='#80cbc4'; ctx.fillText('2560',0,16);
  ctx.restore();

  // ---- HC-SR04 ULTRASONIC ----
  ctx.save(); ctx.translate(0, -H/2-28);
  ctx.fillStyle='#1565c0'; ctx.fillRect(-28,-12,56,24);
  ctx.strokeStyle='#42a5f5'; ctx.lineWidth=1; ctx.strokeRect(-28,-12,56,24);
  // eyes
  [-14, 14].forEach(ex => {
    ctx.beginPath(); ctx.arc(ex,0,10,0,Math.PI*2);
    ctx.fillStyle='#90caf9'; ctx.fill();
    ctx.strokeStyle='#0d47a1'; ctx.lineWidth=1.5; ctx.stroke();
    ctx.beginPath(); ctx.arc(ex,0,5,0,Math.PI*2);
    ctx.fillStyle='#1a237e'; ctx.fill();
  });
  // sonic waves animation
  if(robotRunning && frame%2===0){
    for(let r=15;r<=35;r+=8){
      ctx.beginPath(); ctx.arc(0,-r-12,r,Math.PI,Math.PI*2);
      ctx.strokeStyle=`rgba(100,200,255,${1-(r-15)/30})`; ctx.lineWidth=1.5; ctx.stroke();
    }
  }
  ctx.fillStyle='#90caf9'; ctx.font='6px monospace'; ctx.textAlign='center';
  ctx.fillText('HC-SR04',0,18);
  ctx.restore();

  // ---- HC-05 BLUETOOTH ----
  ctx.save(); ctx.translate(-W/2-10, 60);
  ctx.fillStyle='#1a237e'; ctx.fillRect(-16,-12,32,24);
  ctx.strokeStyle='#3f51b5'; ctx.lineWidth=1; ctx.strokeRect(-16,-12,32,24);
  ctx.fillStyle='#fff'; ctx.font='5px monospace'; ctx.textAlign='center';
  ctx.fillText('HC-05',0,2);
  ctx.fillStyle='#29b6f6'; ctx.fillText('BT',0,-4);
  // BT blink
  if(robotRunning && frame%20<10){
    ctx.beginPath(); ctx.arc(0,-16,4,0,Math.PI*2);
    ctx.fillStyle='#29b6f6'; ctx.fill();
  }
  ctx.restore();

  // ---- 9V BATTERY ----
  ctx.save(); ctx.translate(W/2+22, 60);
  ctx.fillStyle='#4a4a4a'; ctx.fillRect(-14,-28,28,50);
  ctx.strokeStyle='#9e9e9e'; ctx.lineWidth=1; ctx.strokeRect(-14,-28,28,50);
  ctx.fillStyle='#f9a825'; ctx.fillRect(-6,-32,12,6);
  ctx.fillStyle='#ef5350'; ctx.fillRect(-4,-36,8,5);
  ctx.fillStyle='#fff'; ctx.font='6px monospace'; ctx.textAlign='center';
  ctx.fillText('9V',0,5);
  ctx.fillStyle='#aaa'; ctx.fillText('BAT',0,14);
  ctx.restore();

  // ---- LEDs ----
  // Green LED (pin 8) - GO
  ctx.save(); ctx.translate(-30, H/2-10);
  ctx.beginPath(); ctx.arc(0,0,7,0,Math.PI*2);
  ctx.fillStyle = ledOn ? '#00e676' : '#1b5e20';
  if(ledOn){ ctx.shadowColor='#00e676'; ctx.shadowBlur=12; }
  ctx.fill(); ctx.shadowBlur=0;
  ctx.strokeStyle='#fff'; ctx.lineWidth=0.5; ctx.stroke();
  ctx.fillStyle='#fff'; ctx.font='5px sans-serif'; ctx.textAlign='center';
  ctx.fillText('GO',0,14);
  ctx.restore();

  // Red LED (pin 9) - STOP
  ctx.save(); ctx.translate(30, H/2-10);
  ctx.beginPath(); ctx.arc(0,0,7,0,Math.PI*2);
  ctx.fillStyle = !ledOn && !robotRunning ? '#ff1744' : '#7f0000';
  if(!ledOn){ ctx.shadowColor='#ff1744'; ctx.shadowBlur=12; }
  ctx.fill(); ctx.shadowBlur=0;
  ctx.strokeStyle='#fff'; ctx.lineWidth=0.5; ctx.stroke();
  ctx.fillStyle='#fff'; ctx.font='5px sans-serif'; ctx.textAlign='center';
  ctx.fillText('STOP',0,14);
  ctx.restore();

  // caster ball (front center)
  ctx.save(); ctx.translate(0, H/2+18);
  ctx.beginPath(); ctx.arc(0,0,10,0,Math.PI*2);
  ctx.fillStyle='#b0bec5'; ctx.fill();
  ctx.strokeStyle='#90a4ae'; ctx.lineWidth=1.5; ctx.stroke();
  // shine
  ctx.beginPath(); ctx.arc(-3,-3,3,0,Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,0.5)'; ctx.fill();
  // mount
  ctx.fillStyle='#607d8b'; ctx.fillRect(-8,-16,16,6);
  ctx.restore();

  // WIRING (simplified colored wires)
  const wires = [
    { from:[0,-H/2+5], to:[0,-40], color:'#f44336' },        // ultrasonic VCC red
    { from:[10,-H/2+5], to:[20,-40], color:'#4caf50' },       // TRIG green
    { from:[20,-H/2+5], to:[30,-40], color:'#ffd600' },       // ECHO yellow
    { from:[-W/2+5,-20], to:[-30,-20], color:'#2196f3' },     // IN1 blue
    { from:[-W/2+5,-10], to:[-30,-10], color:'#9c27b0' },     // IN2 purple
    { from:[W/2+15,50], to:[30,40], color:'#f44336' },        // battery+
    { from:[W/2+15,70], to:[30,50], color:'#212121' },        // battery-
  ];
  wires.forEach(w => {
    ctx.beginPath();
    ctx.moveTo(w.from[0], w.from[1]);
    ctx.quadraticCurveTo(
      (w.from[0]+w.to[0])/2, w.from[1],
      w.to[0], w.to[1]
    );
    ctx.strokeStyle=w.color; ctx.lineWidth=1.5;
    ctx.setLineDash([4,3]); ctx.stroke(); ctx.setLineDash([]);
  });

  ctx.restore();
}

function drawTrack() {
  const trackLen = Math.min(distance, TARGET) / TARGET * (canvas.width - 160);
  // track line
  ctx.fillStyle='rgba(255,255,255,0.05)';
  ctx.fillRect(80, canvas.height-50, canvas.width-160, 20);
  ctx.fillStyle='#00e676';
  ctx.fillRect(80, canvas.height-50, trackLen, 20);
  // markers
  ctx.fillStyle='#fff'; ctx.font='11px monospace'; ctx.textAlign='left';
  ctx.fillText('0cm', 80, canvas.height-55);
  ctx.textAlign='right';
  ctx.fillText('200cm', canvas.width-80, canvas.height-55);
  ctx.textAlign='center';
  ctx.fillText(distance.toFixed(1)+'cm', 80+trackLen, canvas.height-55);
}

function drawGrid() {
  ctx.strokeStyle='rgba(0,188,212,0.07)'; ctx.lineWidth=1;
  for(let x=0;x<canvas.width;x+=40){
    ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,canvas.height); ctx.stroke();
  }
  for(let y=0;y<canvas.height;y+=40){
    ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(canvas.width,y); ctx.stroke();
  }
}

function loop() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle='#0d1117'; ctx.fillRect(0,0,canvas.width,canvas.height);
  drawGrid();

  update();

  // update HUD
  document.getElementById('distVal').textContent = distance.toFixed(1);
  document.getElementById('obsVal').textContent  = obstacleNear ? '⚠️ '+OBS_DIST+'cm!' : 'clear';
  document.getElementById('ledVal').textContent  = ledOn ? '🟢 ON' : '🔴 OFF';
  document.getElementById('encL').textContent   = Math.floor(encoderL);
  document.getElementById('encR').textContent   = Math.floor(encoderR);

  drawTrack();
  drawRobot(CX, CY - 20);

  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
