
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#dce3ea;display:flex;flex-direction:column;align-items:center;font-family:monospace;padding-bottom:8px}
canvas{display:block;cursor:grab;touch-action:none}
canvas:active{cursor:grabbing}
#btns{display:flex;gap:8px;margin-top:8px}
button{padding:7px 20px;border:none;border-radius:6px;font-size:13px;font-weight:bold;cursor:pointer}
.go{background:#27ae60;color:#fff}.stop{background:#c0392b;color:#fff}.rst{background:#2980b9;color:#fff}
#lbl{font-size:11px;color:#555;margin-top:4px}
</style>
<canvas id="cv" width="680" height="440"></canvas>
<div id="btns">
  <button class="go" onclick="running=true">▶ START</button>
  <button class="stop" onclick="running=false">■ STOP</button>
  <button class="rst" onclick="running=false;wA=0;rY=0.52;rX=-0.38;draw()">↺ RESET</button>
</div>
<div id="lbl">اسحب للتدوير • scroll للزووم</div>
<script>
const cv=document.getElementById('cv');
const c=cv.getContext('2d');
let rY=0.52,rX=-0.38,zoom=1,running=false,wA=0;
let drag=false,lx=0,ly=0;

cv.addEventListener('mousedown',e=>{drag=true;lx=e.offsetX;ly=e.offsetY});
cv.addEventListener('mousemove',e=>{if(!drag)return;rY+=(e.offsetX-lx)*0.012;rX+=(e.offsetY-ly)*0.012;lx=e.offsetX;ly=e.offsetY;draw()});
cv.addEventListener('mouseup',()=>drag=false);
cv.addEventListener('mouseleave',()=>drag=false);
cv.addEventListener('wheel',e=>{zoom=Math.max(0.5,Math.min(2,zoom-e.deltaY*0.001));draw();e.preventDefault()},{passive:false});
cv.addEventListener('touchstart',e=>{drag=true;lx=e.touches[0].clientX;ly=e.touches[0].clientY});
cv.addEventListener('touchmove',e=>{if(!drag)return;rY+=(e.touches[0].clientX-lx)*0.012;rX+=(e.touches[0].clientY-ly)*0.012;lx=e.touches[0].clientX;ly=e.touches[0].clientY;draw();e.preventDefault()},{passive:false});
cv.addEventListener('touchend',()=>drag=false);

function project(x,y,z){
  const cx=Math.cos(rY),sx=Math.sin(rY);
  const cy=Math.cos(rX),sy=Math.sin(rX);
  const x2=cx*x+sx*z;
  const z2=-sx*x+cx*z;
  const y2=cy*y-sy*z2;
  const z3=sy*y+cy*z2;
  return[340+x2*160*zoom, 220+y2*160*zoom-z3*20*zoom, z3];
}

function poly(pts,fill,stroke,alpha){
  if(pts.length<2)return;
  c.save();
  c.globalAlpha=alpha||1;
  c.beginPath();
  c.moveTo(pts[0][0],pts[0][1]);
  for(let i=1;i<pts.length;i++)c.lineTo(pts[i][0],pts[i][1]);
  c.closePath();
  if(fill){c.fillStyle=fill;c.fill();}
  if(stroke){c.strokeStyle=stroke;c.lineWidth=0.8;c.stroke();}
  c.restore();
}

function box(x,y,z,w,h,d,top,side,front,alpha){
  const p=([a,b,cc])=>project(a,b,cc);
  const x2=x+w,y2=y+h,z2=z+d;
  const tl=p([x,y2,z]),tr=p([x2,y2,z]),br=p([x2,y2,z2]),bl=p([x,y2,z2]);
  const tlt=p([x,y2,z]),trt=p([x2,y2,z]),trbk=p([x2,y,z]),tlbk=p([x,y,z]);
  const tlf=p([x,y2,z2]),trf=p([x2,y2,z2]),brf=p([x2,y,z2]),blf=p([x,y,z2]);
  poly([tl,tr,trbk,tlbk],top,null,alpha);
  poly([tlf,trf,trf,blf],null,'rgba(0,0,0,0.08)',alpha);
  poly([tlbk,tl,tlf,blf],side,'rgba(0,0,0,0.15)',alpha);
  poly([trbk,tlbk,blf,brf],null,null,alpha);
  poly([tl,tr,trf,tlf],top,null,alpha);
  poly([tr,trbk,brf,trf],front,null,alpha);
  poly([tl,tr,trf,tlf],top,'rgba(0,0,0,0.06)',alpha);
  poly([tr,trbk,brf,trf],front,'rgba(0,0,0,0.12)',alpha);
  poly([tl,tlbk,blf,tlf],side,'rgba(0,0,0,0.18)',alpha);
}

function circle3d(cx,cy,cz,r,axis,col,segs){
  segs=segs||24;
  const pts=[];
  for(let i=0;i<=segs;i++){
    const a=(i/segs)*Math.PI*2;
    let px,py,pz;
    if(axis==='x'){px=cx;py=cy+Math.cos(a)*r;pz=cz+Math.sin(a)*r;}
    else if(axis==='z'){px=cx+Math.cos(a)*r;py=cy+Math.sin(a)*r;pz=cz;}
    else{px=cx+Math.cos(a)*r;py=cy;pz=cz+Math.sin(a)*r;}
    pts.push(project(px,py,pz));
  }
  c.beginPath();
  c.moveTo(pts[0][0],pts[0][1]);
  for(let i=1;i<pts.length;i++)c.lineTo(pts[i][0],pts[i][1]);
  c.closePath();
  c.fillStyle=col;c.fill();
  c.strokeStyle='rgba(0,0,0,0.3)';c.lineWidth=0.7;c.stroke();
}

function wheel(cx,cy,cz,angle){
  const OR=0.22,IR=0.1,W=0.11,seg=20;
  for(let i=0;i<seg;i++){
    const a0=(i/seg)*Math.PI*2+angle;
    const a1=((i+1)/seg)*Math.PI*2+angle;
    const tread=i%3===0;
    const OR2=tread?OR*1.08:OR;
    const col=tread?'#1a1a1a':'#2c2c2c';
    const p=([a,b,d])=>project(a,b,d);
    const pts=[
      p([cx,cy+Math.cos(a0)*OR2,cz+Math.sin(a0)*OR2]),
      p([cx,cy+Math.cos(a1)*OR2,cz+Math.sin(a1)*OR2]),
      p([cx+W,cy+Math.cos(a1)*OR2,cz+Math.sin(a1)*OR2]),
      p([cx+W,cy+Math.cos(a0)*OR2,cz+Math.sin(a0)*OR2]),
    ];
    poly(pts,col,'rgba(0,0,0,0.2)');
  }
  circle3d(cx,cy,cz,OR,'x','#222',seg);
  circle3d(cx+W,cy,cz,OR,'x','#222',seg);
  circle3d(cx+W/2,cy,cz,IR,'x','#c8c010',12);
  for(let i=0;i<5;i++){
    const a=(i/5)*Math.PI*2+angle;
    const sy=cy+Math.cos(a)*IR*0.85,sz=cz+Math.sin(a)*IR*0.85;
    const ey=cy+Math.cos(a+Math.PI)*IR*0.85,ez=cz+Math.sin(a+Math.PI)*IR*0.85;
    const p1=project(cx+W/2,sy,sz),p2=project(cx+W/2,ey,ez);
    c.beginPath();c.moveTo(p1[0],p1[1]);c.lineTo(p2[0],p2[1]);
    c.strokeStyle='#a09000';c.lineWidth=2;c.stroke();
  }
  circle3d(cx+W/2,cy,cz,0.025,'x','#555',10);
}

function motor(mx,my,mz){
  box(mx,my-0.1,mz-0.07,0.22,0.14,0.14,'#c8a500','#b09000','#a08000');
  box(mx+0.22,my-0.07,mz-0.05,0.06,0.1,0.1,'#888','#777','#666');
  box(mx+0.28,my-0.02,mz-0.02,0.08,0.04,0.04,'#555','#444','#333');
  for(let i=0;i<3;i++){
    box(mx,my+0.04,mz-0.07+i*0.05,0.22,0.01,0.01,'#333','#222','#222');
  }
}

function encoder(ex,ey,ez){
  circle3d(ex,ey,ez,0.08,'x','#607080',16);
  circle3d(ex,ey,ez,0.03,'x','#304050',10);
  for(let i=0;i<8;i++){
    const a=(i/8)*Math.PI*2;
    const p1=project(ex,ey+Math.cos(a)*0.03,ez+Math.sin(a)*0.03);
    const p2=project(ex,ey+Math.cos(a)*0.08,ez+Math.sin(a)*0.08);
    c.beginPath();c.moveTo(p1[0],p1[1]);c.lineTo(p2[0],p2[1]);
    c.strokeStyle=i%2?'#fff':'#000';c.lineWidth=1.5;c.stroke();
  }
}

function draw(){
  c.clearRect(0,0,680,440);
  c.fillStyle='#dce3ea';c.fillRect(0,0,680,440);

  const wa=wA;

  box(-0.55,-0.04,-0.7,1.1,0.06,1.4,'rgba(180,210,230,0.55)','rgba(160,195,220,0.45)','rgba(150,185,215,0.45)',0.6);

  const holes=[[-0.45,-0.01,-0.6],[-0.45,-0.01,0.6],[0.45,-0.01,-0.6],[0.45,-0.01,0.6]];
  holes.forEach(([hx,hy,hz])=>{
    circle3d(hx,hy,hz,0.04,'y','rgba(100,140,180,0.5)',8);
  });

  box(-0.18,-0.14,-0.1,0.36,0.1,0.32,'#aaa','#888','#999');
  box(-0.08,-0.04,-0.14,0.16,0.04,0.28,'#c8a500','#b09000','#a08000');

  box(-0.22,-0.14,0.1,0.44,0.08,0.24,'#006060','#004d4d','#005555');
  box(-0.16,-0.06,0.14,0.14,0.02,0.1,'#004040','#003535','#003535');
  for(let i=0;i<6;i++){
    box(-0.2,-0.06,0.12+i*0.03,0.02,0.04,0.01,'#c8a500','#b09000','#b09000');
  }

  box(-0.15,-0.14,0.4,0.3,0.09,0.18,'#1a5e1a','#145014','#145014');
  box(-0.08,-0.05,0.43,0.16,0.03,0.1,'#0d3d0d','#0a2e0a','#0a2e0a');

  box(-0.14,-0.12,0.62,0.12,0.07,0.1,'#1a237e','#151a6a','#151a6a');

  box(-0.13,0.02,0.66,0.26,0.1,0.07,'#1565c0','#1050a0','#1050a0');
  circle3d(-0.07,0.09,0.7,0.045,'y','#90b4e0',16);
  circle3d(0.07,0.09,0.7,0.045,'y','#90b4e0',16);
  circle3d(-0.07,0.09,0.7,0.02,'y','#1a237e',10);
  circle3d(0.07,0.09,0.7,0.02,'y','#1a237e',10);

  const p1=project(-0.07,0.09,0.7),p2=project(0.07,0.09,0.7);
  c.beginPath();c.arc(p1[0],p1[1],4*zoom,0,Math.PI*2);c.fillStyle='#6af';c.fill();
  c.beginPath();c.arc(p2[0],p2[1],4*zoom,0,Math.PI*2);c.fillStyle='#6af';c.fill();

  motor(-0.55,-0.04,-0.28);
  motor(0.33,-0.04,-0.28);

  encoder(-0.55,0,-0.28);
  encoder(0.55,0,-0.28);

  const wires=[
    {from:[-0.1,-0.04,-0.1],to:[-0.22,-0.1,-0.1],col:'#e53935'},
    {from:[0.1,-0.04,-0.1],to:[0.22,-0.1,-0.1],col:'#000'},
    {from:[-0.1,-0.04,0.15],to:[-0.22,-0.06,0.15],col:'#1565c0'},
    {from:[0,-0.04,0.62],to:[0,0.02,0.64],col:'#e53935'},
  ];
  wires.forEach(w=>{
    const p1=project(...w.from),p2=project(...w.to);
    c.beginPath();c.moveTo(p1[0],p1[1]);
    c.quadraticCurveTo((p1[0]+p2[0])/2,p1[1]-10*zoom,p2[0],p2[1]);
    c.strokeStyle=w.col;c.lineWidth=1.5;c.setLineDash([3,2]);c.stroke();c.setLineDash([]);
  });

  circle3d(0,-0.12,-0.58,0.08,'y','#888',14);
  circle3d(0,-0.18,-0.58,0.06,'y','#222',12);
  const csp=project(0,-0.15,-0.58);
  c.beginPath();c.arc(csp[0],csp[1],3*zoom,0,Math.PI*2);c.fillStyle='rgba(255,255,255,0.4)';c.fill();

  wheel(-0.74,0,-0.3,wa);
  wheel( 0.52,0,-0.3,wa);

  const ledOn=running;
  const lp=project(0.18,-0.04,0.48);
  c.beginPath();c.arc(lp[0],lp[1],5*zoom,0,Math.PI*2);
  c.fillStyle=ledOn?'#00e676':'#1b5e20';c.fill();
  c.strokeStyle='#fff';c.lineWidth=0.5;c.stroke();
  const lp2=project(0.28,-0.04,0.48);
  c.beginPath();c.arc(lp2[0],lp2[1],5*zoom,0,Math.PI*2);
  c.fillStyle=ledOn?'#f44':'#7f0000';c.fill();
  c.strokeStyle='#fff';c.lineWidth=0.5;c.stroke();

  const labels=[
    {pos:[0,0.18,0.7],text:'HC-SR04'},
    {pos:[-0.55,0.08,-0.28],text:'Motor L'},
    {pos:[0.55,0.08,-0.28],text:'Motor R'},
    {pos:[0,0.05,-0.14],text:'L298N'},
    {pos:[0,0.05,0.25],text:'Arduino'},
    {pos:[-0.14,0.05,0.62],text:'HC-05 BT'},
    {pos:[0,0.04,-0.58],text:'Caster'},
  ];
  labels.forEach(l=>{
    const pt=project(...l.pos);
    c.fillStyle='rgba(0,0,0,0.65)';
    c.font=`bold ${10*zoom}px monospace`;
    c.textAlign='center';
    c.fillText(l.text,pt[0],pt[1]);
  });
}

function loop(){
  requestAnimationFrame(loop);
  if(running){wA+=0.06;if(!drag)rY+=0.003;}
  draw();
}
loop();
</script>
